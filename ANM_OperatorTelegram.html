<script>
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'anm-operator-v1';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
    self.addEventListener('fetch', e => {
      if(e.request.url.includes('fonts.googleapis') || e.request.url.includes('fonts.gstatic') || e.request.url.includes('cdnjs') || e.request.url.includes('unpkg')) {
        e.respondWith(
          caches.open(CACHE).then(cache =>
            cache.match(e.request).then(cached =>
              cached || fetch(e.request).then(res => { cache.put(e.request, res.clone()); return res; })
            )
          )
        );
      }
    });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}

// ── TOAST HOOK ─────────────────────────────────────────────────────────────
function useToast() {
  const [t,setT] = useState({msg:"",show:false});
  const ref = useRef();
  const fire = useCallback(msg => {
    setT({msg,show:true});
    clearTimeout(ref.current);
    ref.current = setTimeout(()=>setT(p=>({...p,show:false})),2400);
  },[]);
  return [t,fire];
}

// ── DAY PANEL ─────────────────────────────────────────────────────────────────
function DayPanel({dayDetail,mo,yr,vetture,vetturaInput,setVetturaInput,addVettura,removeVettura,saeCodes,saeInput,setSaeInput,addSae,removeSae,guasti,guastoOpen,guastoInput,setGuastoInput,toggleGuasto,saveGuasto,shareGuasti,openStripFromDetail,setDayDetail}){
  const dd=dayDetail, s=dd?.shift;
  const _sm=s?.start?s.start.split(":").map(Number):[];
  const _smin=_sm.length===2?_sm[0]*60+_sm[1]:-1;
  const fascia=_smin>=240&&_smin<=960?"🌅 Mattina":_smin>=0?"🌙 Sera":null;
  return (
    <div className={`dpanel${dd?"":" hidden"}`} style={{borderTop:s?`3px solid ${s.color}`:"3px solid #333"}}>
      <div className="dpanel-hero" style={{background:s?`linear-gradient(135deg,${s.color}40,${s.color}15)`:"rgba(255,255,255,.03)"}}>
        <div className="dpanel-icon" style={{background:s?s.color+"33":"rgba(255,255,255,.06)"}}>{s?s.icon:"📅"}</div>
        <div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.35)",fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",marginBottom:4}}>{dd?.d} {MONTHS[mo]} {yr}</div>
          <div className="dpanel-title" style={{color:s?s.color:"#E2E2F0"}}>{s?(s.linea||s.label):"Nessun turno"}</div>
          {s&&fascia&&<div className="dpanel-fascia" style={{color:s.color,opacity:.9}}>{fascia}</div>}
          {!s&&<div style={{fontSize:13,color:"#555",marginTop:4}}>Tocca "Assegna turno" per aggiungerne uno</div>}
        </div>
      </div>
      <div className="dpanel-body">
        {s?.start&&s?.end&&<div className="dpanel-row"><span className="dpanel-row-ic">⏰</span><div className="dpanel-row-content"><div className="dpanel-row-label">Orario turno</div><div className="dpanel-row-value" style={{color:"#E2E2F0"}}>{s.start} → {s.end}</div></div></div>}
        {s?.linea&&<div className="dpanel-row"><span className="dpanel-row-ic">🚌</span><div className="dpanel-row-content"><div className="dpanel-row-label">Linea</div><div className="dpanel-row-value" style={{color:s.color}}>{s.linea}</div></div></div>}
        {s&&<div className="vettura-section">
          <div className="vettura-section-label">🚍 Vetture in servizio</div>
          {vetture.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
            {vetture.map(v=>(
              <div key={v}>
                <div className="vettura-chip" style={{justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span className="vettura-chip-num">{v}</span>
                    {guasti[v]&&<span className="guasto-badge">⚠️ {guasti[v]}</span>}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button className={`guasto-btn${guastoOpen===v?" active":""}`} onClick={()=>toggleGuasto(v)}>{guastoOpen===v?"✕ Chiudi":guasti[v]?"✏️ Guasto":"⚠️ Guasto"}</button>
                    <button className="vettura-chip-del" onClick={()=>removeVettura(dd.key,v)}>✕</button>
                  </div>
                </div>
                {guastoOpen===v&&<div className="guasto-panel">
                  <div className="guasto-panel-label">⚠️ Anomalia vettura {v}</div>
                  <textarea className="guasto-textarea" rows={3} placeholder="Es. freni rumorosi, porta bloccata…" value={guastoInput} onChange={e=>setGuastoInput(e.target.value)}/>
                  <button className="guasto-save-btn" onClick={()=>saveGuasto(dd.key)}>{guastoInput.trim()?"💾 Salva guasto":"🗑 Rimuovi guasto"}</button>
                </div>}
              </div>
            ))}
          </div>}
          <div className="vettura-add-row">
            <input className="vettura-inp" type="text" placeholder="Es. 4521 o EX302…" value={vetturaInput} onChange={e=>setVetturaInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){addVettura(dd.key);e.target.blur();}}}/>
            <button className="vettura-add-btn" onClick={()=>addVettura(dd.key)}>+ Aggiungi</button>
          </div>
          {Object.keys(guasti).filter(v=>vetture.includes(v)).length>0&&<button className="guasto-share-btn" onClick={()=>shareGuasti(dd)}>📤 Condividi segnalazione guasto</button>}
        </div>}
        {s&&<div className="vettura-section">
          <div className="vettura-section-label" style={{color:"#A5B4FC"}}>🔖 Codice SAE</div>
          {saeCodes.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {saeCodes.map(sc=><div key={sc} className="sae-chip"><span className="sae-chip-num">{sc}</span><button className="sae-chip-del" onClick={()=>removeSae(dd.key,sc)}>✕</button></div>)}
          </div>}
          <div className="vettura-add-row">
            <input className="vettura-inp" type="text" placeholder="Es. 12345…" value={saeInput} onChange={e=>setSaeInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){addSae(dd.key);e.target.blur();}}}/>
            <button className="sae-add-btn" onClick={()=>addSae(dd.key)}>+ Aggiungi</button>
          </div>
        </div>}
        <div className="dpanel-btns">
          <button className="dpanel-btn-change" onClick={openStripFromDetail}>✏️ {s?"Cambia turno":"Assegna turno"}</button>
          <button className="dpanel-btn-close" onClick={()=>setDayDetail(null)}>✕</button>
        </div>
      </div>
    </div>
  );
}

  function calcEndTime(pres,durata){
    try{const [ph,pm]=pres.split(":").map(Number),[dh,dm]=durata.split(":").map(Number),tot=(ph*60+pm)+(dh*60+dm);return `${String(Math.floor(tot/60)%24).padStart(2,"0")}:${String(tot%60).padStart(2,"0")}`;}catch(e){return "";}
  }

  function parseANMItems(items){
    const dateRe=/^(\d{2})\/(\d{2})\/(\d{4})$/,timeRe=/^\d{2}:\d{2}$/;
    const SKIP=new Set(["Interi","0","Lun","Mar","Mer","Gio","Ven","Sab","Dom","Dep","Linea","PGM"]);
    return items.filter(it=>it.x>=40&&it.x<=115&&dateRe.test(it.str)&&it.y>50&&it.y<720).map(anchor=>{
      const dm=anchor.str.match(dateRe),day=parseInt(dm[1]),month=parseInt(dm[2])-1,year=parseInt(dm[3]);
      const row=items.filter(it=>Math.abs(it.y-anchor.y)<=3.5),rowStr=row.map(i=>i.str).join(" ");
      let tipo="servizio";
      if(/RIPOSO/i.test(rowStr)) tipo="riposo";
      else if(/spezzato\s+apertura/i.test(rowStr)) tipo="spezzato_ap";
      else if(/spezzato\s+chiusura/i.test(rowStr)) tipo="spezzato_ch";
      else if(/DISP/i.test(rowStr)&&/SERALE/i.test(rowStr)) tipo="disp_serale";
      if(tipo!=="servizio") return {day,month,year,tipo,linea:"",uscita:"",pres:"",fine:"",loc:""};
      const get=(x0,x1,test)=>(row.find(it=>it.x>=x0&&it.x<=x1&&(!test||test(it.str)))||{str:""}).str;
      const uscita=get(110,155,t=>timeRe.test(t)),linea=get(155,215,t=>!timeRe.test(t)&&!SKIP.has(t)&&!dateRe.test(t)&&t.length>=2);
      const loc=get(195,250,t=>!timeRe.test(t)&&!SKIP.has(t)&&!dateRe.test(t)&&t.length>=3);
      const pres=get(245,285,t=>timeRe.test(t)),durata=get(345,390,t=>timeRe.test(t));
      return {day,month,year,tipo,linea,uscita,pres,fine:(pres&&durata)?calcEndTime(pres,durata):"",loc};
    });
  }

  async function handleImportFile(e){
    const file=e.target.files[0];if(!file) return;
    e.target.value="";fire("Lettura PDF in corso…");
    try{
      const pdfjs=await loadPdfJs(),arrayBuf=await file.arrayBuffer();
      const pdf=await pdfjs.getDocument({data:new Uint8Array(arrayBuf)}).promise,allItems=[];
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p),vp=page.getViewport({scale:1}),content=await page.getTextContent();
        content.items.forEach(item=>{const str=item.str.trim();if(!str) return;allItems.push({x:Math.round(item.transform[4]*10)/10,y:Math.round((vp.height-item.transform[5])*10)/10,str});});
      }
      const rows=parseANMItems(allItems);
      if(rows.length===0){fire("Nessun turno trovato nel PDF");return;}
      setImportData(rows);fire("Trovati "+rows.length+" giorni - controlla anteprima");
    }catch(err){fire("Errore: "+err.message);}
  }

    const TIPO_MAP={riposo:{id:"riposo",label:"Riposo",icon:"🛌",color:"#10B981",start:"",end:""},spezzato_ap:{id:"spezzato_ap",label:"Spezzato Apertura",icon:"🚌",color:"#F59E0B",start:"",end:""},spezzato_ch:{id:"spezzato_ch",label:"Spezzato Chiusura",icon:"🚌",color:"#FB923C",start:"",end:""},disp_serale:{id:"disp_serale",label:"Disp. Serale",icon:"🌆",color:"#8B5CF6",start:"",end:""},servizio:{id:"servizio",label:"Servizio",icon:"🚌",color:"#3B82F6",start:"",end:""}};
    const newCustom=[...st.custom],newShifts={...st.shifts};
    importData.forEach(row=>{
      const key=dk(row.year,row.month,row.day),def=TIPO_MAP[row.tipo]||TIPO_MAP.servizio;
      const noteParts=[];
      if(row.linea) noteParts.push("Linea "+row.linea);if(row.loc) noteParts.push("Deposito: "+row.loc);
      if(row.pres) noteParts.push("Pres: "+row.pres);if(row.uscita) noteParts.push("Uscita: "+row.uscita);if(row.fine) noteParts.push("Smonto: "+row.fine);
      const note=noteParts.join(" · ");
      if(row.tipo==="servizio"&&row.pres){
        const [ph,pm]=row.pres.split(":").map(Number),pmin=ph*60+pm,isMattina=pmin>=240&&pmin<=960;
        const customId="anm_"+row.year+"*"+String(row.month+1).padStart(2,"0")+"*"+String(row.day).padStart(2,"0")+"_"+(row.linea||"srv");
        const entry={...def,id:customId,label:row.linea||"Servizio",icon:isMattina?"🌅":"🌙",color:isMattina?"#F59E0B":"#8B5CF6",start:row.pres,end:row.fine,linea:row.linea};
        const idx=newCustom.findIndex(c=>c.id===customId);
        if(idx>=0) newCustom[idx]=entry;else newCustom.push(entry);
        newShifts[key]={shiftId:customId,note};
      } else {
        if(!PRESET_SHIFTS.find(p=>p.id===def.id)&&!newCustom.find(c=>c.id===def.id)) newCustom.push(def);
        newShifts[key]={shiftId:def.id,note};
      }
    });
    setSt(p=>({...p,shifts:newShifts,custom:newCustom}));
    setImportData(null);fire(importData.length+" turni importati!");setTab("cal");
  }

  function parseDinoBot(){

    if(!txt){ fire("Incolla il messaggio del bot!"); return; }
    const headerMatch = txt.match(/([A-ZÀÈÌÒÙ]+),\s*per il giorno\s*(\d{2})\/(\d{2})\/(\d{4})/i);
    if(!headerMatch){ fire("Formato non riconosciuto — copia tutto il messaggio"); return; }
    const nome = headerMatch[1];
    const day = parseInt(headerMatch[2]);
    const month = parseInt(headerMatch[3]) - 1;
    const year = parseInt(headerMatch[4]);
    const turnoMatch = txt.match(/Turno\s+([\d\-]+[A-Z]*)/i);
    const turno = turnoMatch ? turnoMatch[1] : "";
    const montoRe = /monto\s+[^a]+alle\s+(\d{2}:\d{2})/gi;
    const smontoRe = /smonto\s+[^a]+alle\s+(\d{2}:\d{2})/gi;
    const monti=[], smonti=[];
    let m;
    while((m=montoRe.exec(txt))!==null) monti.push(m[1]);
    while((m=smontoRe.exec(txt))!==null) smonti.push(m[1]);
    const start = monti[0] || "";
    const end = smonti[smonti.length-1] || "";
    const depMatch = txt.match(/monto\s+([A-Z][^a]+?)\s+alle\s+\d/i);
    const deposito = depMatch ? depMatch[1].trim() : "";
    const nastroPart = txt.split("nastro")[1] || "";
    const nastroCodes = [...new Set((nastroPart.match(/^(\d{4,6})\s/gm)||[]).map(x=>x.trim()))];
    const linea = turno || nastroCodes[0] || "";
    const pezziMatch = txt.match(/Pezzo\s+\d/gi);
    const pezzi = pezziMatch ? pezziMatch.length : 1;
    let icon="🌅", color="#F59E0B";
    if(start){
      const [h]=start.split(":").map(Number);
      if(h>=14&&h<22){icon="☀️";color="#3B82F6";}
      else if(h>=22||h<5){icon="🌙";color="#8B5CF6";}
    }
    const preview = {nome,day,month,year,turno,start,end,deposito,linea,pezzi,icon,color,nastroCodes};
    setDinoPreview(preview);
    fire(`✓ Trovato turno ${turno} del ${day}/${month+1}/${year}`);
  }

    const newShift = {

    };
    const note = [deposito?"Dep: "+deposito:"", pezzi>1?"Pezzi: "+pezzi:""].filter(Boolean).join(" · ");

    for(const line of lines2){
      const l=line.trim();if(!l) continue;
      const dateMatch=l.match(/(\d{1,2})\s+([A-Za-z]{3})/);
      if(dateMatch&&!l.startsWith("⚠️ REGISTRO")){

        currentVettura=null;continue;
      }
      const vetMatch=l.match(/(?:Vettura\s+)?([\w]{2,10})$/i);
      if((l.includes("🚍")||l.toLowerCase().includes("vettura"))&&vetMatch){currentVettura=vetMatch[1].toUpperCase();continue;}
      if(currentDate&&currentVettura&&!l.startsWith("📅")&&!l.startsWith("📱")){
        const desc=l.replace(/^⚠️\s*/,"").trim();
        if(desc.length>=4){found.push({...currentDate,vettura:currentVettura,guasto:desc});currentVettura=null;}
      }
    }
    if(found.length===0) fire("Nessun guasto riconosciuto — controlla il formato");
    else{setGuastiImportPreview(found);fire(`Trovati ${found.length} guasti`);}

                    rows={7}
                    placeholder={"CIRO, per il giorno 13/03/2026 è previsto:\n---\nPezzo 1 --> Turno 147-1 monto DEPOSITO CAV. AOSTA alle 04:55\nsmonto presso DEPOSITO CAV. AOSTA alle 04:56 durata 00:01\n---\n..."}
                    value={dinoText}
                    onChange={e=>{setDinoText(e.target.value);setDinoPreview(null);}}
                    style={{background:"rgba(0,0,0,.3)",border:"1px solid rgba(99,102,241,.3)",borderRadius:10,padding:"10px 12px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,lineHeight:1.6,outline:"none",resize:"none",width:"100%",boxSizing:"border-box"}}
                  />

                  {dinoPreview&&<div style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.35)",borderRadius:12,padding:14}}>
                    <div style={{fontSize:10,fontWeight:800,color:"#A5B4FC",textTransform:"uppercase",letterSpacing:".8px",marginBottom:10}}>✅ Turno riconosciuto</div>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                      <div style={{width:48,height:48,borderRadius:12,background:dinoPreview.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{dinoPreview.icon}</div>
                      <div>
                        <div style={{fontWeight:800,fontSize:16,color:dinoPreview.color}}>Turno {dinoPreview.turno}</div>
                        <div style={{fontSize:12,color:"#aaa"}}>{dinoPreview.day}/{dinoPreview.month+1}/{dinoPreview.year}</div>
                      </div>
                    </div>
                    {dinoPreview.start&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <div style={{background:"rgba(255,255,255,.05)",borderRadius:8,padding:"6px 12px",fontSize:12,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
                        🕐 {dinoPreview.start} → {dinoPreview.end}
                      </div>
                      {dinoPreview.pezzi>1&&<div style={{background:"rgba(255,255,255,.05)",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700}}>
                        🧩 {dinoPreview.pezzi} pezzi
                      </div>}
                      {dinoPreview.deposito&&<div style={{background:"rgba(255,255,255,.05)",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700}}>
                        📍 {dinoPreview.deposito.length>20?dinoPreview.deposito.substring(0,20)+"…":dinoPreview.deposito}
                      </div>}
                    </div>}
                  </div>}

                  <div style={{display:"flex",gap:8}}>
                    <button
                      onClick={parseDinoBot}
                      disabled={!dinoText.trim()}
                      style={{flex:1,background:"rgba(99,102,241,.2)",border:"1px solid rgba(99,102,241,.5)",color:"#A5B4FC",padding:"12px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,opacity:dinoText.trim()?1:.4}}>
                      🔍 Analizza
                    </button>
                    {dinoPreview&&<button
                      onClick={confirmDinoImport}
                      style={{flex:1,background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",color:"white",padding:"12px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13}}>
                      ✓ Importa nel calendario
                    </button>}
                  </div>
                  <button onClick={()=>{setDinoOpen(false);setDinoText("");setDinoPreview(null);}} style={{background:"none",border:"none",color:"#333",padding:"8px",cursor:"pointer",fontSize:12,fontFamily:"'Syne',sans-serif",width:"100%"}}>Annulla</button>
                </>}
              </div>
            </div>

            <div style={{marginTop:16,borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:20}}>
              <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:".6px",marginBottom:14}}>Ricevuto dai colleghi</div>
              <div className="esporta-card">
                <div className="esporta-card-title">⚠️ Lista guasti collega</div>
                <div className="esporta-card-desc">Incolla la lista guasti ricevuta via WhatsApp per aggiungerla al registro.</div>
                <button className="esporta-btn esporta-btn-guasti" onClick={()=>setGuastiImportOpen(p=>!p)}>
                  <div className="esporta-btn-ic">⚠️</div>
                  <div className="esporta-btn-body"><div className="esporta-btn-label">Importa lista guasti</div><div className="esporta-btn-sub">Incolla testo ricevuto</div></div>
                  <span style={{fontSize:18,opacity:.5}}>{guastiImportOpen?"∨":"›"}</span>
                </button>
                {guastiImportOpen&&<>
                  <textarea className="guasto-textarea" rows={6} placeholder={"⚠️ REGISTRO GUASTI\n\n📅 12 Mar\n🚍 Vettura 4521\n⚠️ Freni rumorosi"} value={guastiImportText} onChange={e=>setGuastiImportText(e.target.value)} style={{width:"100%",boxSizing:"border-box",marginTop:8}}/>
                  {guastiImportPreview.length>0&&<div style={{marginTop:8,marginBottom:4}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#EF4444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:6}}>Anteprima — {guastiImportPreview.length} guasti</div>
                    {guastiImportPreview.map((g,i)=><div key={i} style={{background:"rgba(239,68,68,.07)",borderRadius:9,padding:"8px 12px",marginBottom:4,fontSize:12}}><strong style={{color:"#FF6B35"}}>🚍 {g.vettura}</strong><br/>{g.guasto}</div>)}
                  </div>}
                  <div style={{display:"flex",gap:8,marginTop:8}}>
                    <button className="import-confirm" style={{flex:1}} onClick={parseGuastiImport} disabled={!guastiImportText.trim()}>🔍 Analizza</button>
                    {guastiImportPreview.length>0&&<button className="import-confirm" style={{flex:1,background:"linear-gradient(135deg,#EF4444,#DC2626)"}} onClick={confirmGuastiImport}>✓ Importa {guastiImportPreview.length}</button>}
                  </div>
                  <button className="import-cancel" onClick={()=>{setGuastiImportOpen(false);setGuastiImportText("");setGuastiImportPreview([]);}}>Annulla</button>
                </>}
              </div>
            </div>
          </div>}

          {/* ESPORTA */}
          {tab==="esporta"&&<div className="slide-up">
            <div className="ph">📤 Esporta</div>
            <div className="ps">Condividi turni e segnalazioni con i colleghi.</div>
            <div className="esporta-card">
              <div className="esporta-card-title">🔄 Cambio turno</div>
              <div className="esporta-card-desc">Invia i dettagli del turno al collega che ti sostituisce.</div>
              <input type="date" value={cambioGiorno} onChange={e=>setCambioGiorno(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:9,padding:"10px 12px",color:"#E2E2F0",fontSize:14,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,boxSizing:"border-box",outline:"none"}}/>
              {cambioPrev?.vuoto&&<div style={{fontSize:12,color:"#444",padding:"4px 0"}}>Nessun turno registrato per questo giorno.</div>}
              {cambioPrev&&!cambioPrev.vuoto&&<div style={{background:"rgba(255,107,53,.08)",border:"1px solid rgba(255,107,53,.2)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:20}}>{cambioPrev.sh.icon}</span><span style={{fontWeight:800,color:"#FF6B35"}}>{cambioPrev.sh.label}</span></div>
                {cambioPrev.sh.start&&<div style={{fontSize:13,color:"#ccc"}}>🕐 {cambioPrev.sh.start} – {cambioPrev.sh.end}</div>}
                {cambioPrev.sh.linea&&<div style={{fontSize:13,color:"#ccc"}}>🚍 Linea {cambioPrev.sh.linea}</div>}
                {cambioPrev.vets.length>0&&<div style={{fontSize:13,color:"#ccc"}}>🚌 Vettura: {cambioPrev.vets.join(", ")}</div>}
              </div>}
              <button className="esporta-btn" style={{background:"rgba(255,107,53,.12)",border:"1px solid rgba(255,107,53,.35)",color:"#FF6B35"}} onClick={shareTurnoSingolo}>
                <div className="esporta-btn-ic">🔄</div><div className="esporta-btn-body"><div className="esporta-btn-label">Invia cambio turno</div><div className="esporta-btn-sub">WhatsApp · Mail · Telegram · Appunti</div></div>
                <span style={{fontSize:18,opacity:.5}}>›</span>
              </button>
            </div>
            <div className="esporta-card">
              <div className="esporta-card-title">📅 I miei turni</div>
              <div className="esporta-card-desc">Riepilogo mensile con orari e linee.</div>
              <button className="esporta-btn esporta-btn-turni" onClick={shareMonth}>
                <div className="esporta-btn-ic">🔗</div><div className="esporta-btn-body"><div className="esporta-btn-label">Condividi turni mese</div><div className="esporta-btn-sub">WhatsApp · Mail · Telegram · Appunti</div></div>
                <span style={{fontSize:18,opacity:.5}}>›</span>
              </button>
            </div>
            <div className="esporta-card">
              <div className="esporta-card-title">📋 Quindicinale</div>
              <div className="esporta-card-desc">Esporta foglio quindicinale per un intervallo di date.</div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:1}}><div style={{fontSize:10,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Dal</div><input type="date" value={esportaDal} onChange={e=>setEsportaDal(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:9,padding:"9px 10px",color:"#E2E2F0",fontSize:13,boxSizing:"border-box",outline:"none"}}/></div>
                <div style={{flex:1}}><div style={{fontSize:10,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Al</div><input type="date" value={esportaAl} onChange={e=>setEsportaAl(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:9,padding:"9px 10px",color:"#E2E2F0",fontSize:13,boxSizing:"border-box",outline:"none"}}/></div>
              </div>
              <button className="esporta-btn esporta-btn-quindicinale" onClick={shareQuindicinale}>
                <div className="esporta-btn-ic">📋</div><div className="esporta-btn-body"><div className="esporta-btn-label">Condividi quindicinale</div><div className="esporta-btn-sub">WhatsApp · Mail · Telegram · Appunti</div></div>
                <span style={{fontSize:18,opacity:.5}}>›</span>
              </button>
            </div>
            <div className="esporta-card">
              <div className="esporta-card-title">⚠️ Mezzi guasti</div>
              <div className="esporta-card-desc">Lista anomalie registrate nel periodo selezionato.</div>
              <button className="esporta-btn esporta-btn-guasti" onClick={shareGuastiRange}>
                <div className="esporta-btn-ic">📤</div><div className="esporta-btn-body"><div className="esporta-btn-label">Condividi lista guasti</div><div className="esporta-btn-sub">Usa le stesse date del Quindicinale</div></div>
                <span style={{fontSize:18,opacity:.5}}>›</span>
              </button>
            </div>
          </div>}

          {/* GUIDA */}
          {tab==="guide"&&<div className="slide-up">
            <div className="ph">❓ Guida rapida</div>
            <div style={{padding:"0 0 24px",color:"#aaa",fontSize:14,lineHeight:1.8}}>
              <div style={{background:"linear-gradient(135deg,rgba(255,107,53,.1),rgba(255,60,172,.07))",border:"1px solid rgba(255,107,53,.2)",borderRadius:14,padding:16,marginBottom:20,textAlign:"center"}}>
                <div style={{display:"flex",justifyContent:"center",marginBottom:8}}>
                  <ANMLogo size={28} />
                </div>
                <div style={{fontWeight:800,fontSize:15,color:"#E2E2F0",marginBottom:4}}>Operatore</div>
                <div style={{fontSize:12,color:"#555"}}>Gestione turni · Napoli · v1.0</div>
              </div>
              <p><strong style={{color:"#FF6B35"}}>📅 Calendario</strong> — Tocca un giorno per il dettaglio. Toccane due per assegnare un range di turni.</p><br/>
              <p><strong style={{color:"#FF6B35"}}>🔄 Rotazione</strong> — Costruisci un ciclo di turni che si ripete automaticamente per settimane o mesi.</p><br/>
              <p><strong style={{color:"#FF6B35"}}>📥 Importa PDF</strong> — Carica il PDF ANM per importare tutti i tuoi turni automaticamente.</p><br/>
              <p><strong style={{color:"#FF6B35"}}>📤 Esporta</strong> — Condividi turno singolo, mensile, quindicinale o lista guasti via WhatsApp e Telegram.</p><br/>
              <p><strong style={{color:"#FF6B35"}}>🚍 Vetture &amp; SAE</strong> — Dal dettaglio giorno registra numero vettura, codice SAE e segnala guasti.</p><br/>
              <p><strong style={{color:"#FF6B35"}}>💾 I dati si salvano</strong> — Tutto viene salvato automaticamente sul tuo telefono.</p>
              <div style={{marginTop:20,background:"rgba(16,185,129,.07)",border:"1px solid rgba(16,185,129,.2)",borderRadius:12,padding:14}}>
                <div style={{fontSize:11,fontWeight:800,color:"#10B981",textTransform:"uppercase",letterSpacing:".8px",marginBottom:8}}>📲 Installa come app</div>
                <div style={{fontSize:12,color:"#555",lineHeight:1.6}}>
                  <strong style={{color:"#888"}}>Android:</strong> Menu browser → "Aggiungi a schermata Home"<br/>
                  <strong style={{color:"#888"}}>iPhone:</strong> Tasto Condividi → "Aggiungi alla schermata Home"
                </div>
              </div>
              <p style={{color:"#333",fontSize:11,textAlign:"center",marginTop:20}}>Operatore · Fatto con ❤️ per gli operatori ANM Napoli</p>
            </div>
          </div>}

        </div>{/* end scroll */}

        {/* DAY PANEL */}
        <DayPanel dayDetail={dayDetail} mo={mo} yr={yr}
          vetture={vetture} vetturaInput={vetturaInput} setVetturaInput={setVetturaInput} addVettura={addVettura} removeVettura={removeVettura}
          saeCodes={saeCodes} saeInput={saeInput} setSaeInput={setSaeInput} addSae={addSae} removeSae={removeSae}
          guasti={guasti} guastoOpen={guastoOpen} guastoInput={guastoInput} setGuastoInput={setGuastoInput}
          toggleGuasto={toggleGuasto} saveGuasto={saveGuasto} shareGuasti={shareGuastiDay}
          openStripFromDetail={openStripFromDetail} setDayDetail={setDayDetail}/>

        {/* SHIFT PICKER STRIP */}
        <div className={`strip-wrap${stripOpen?"":" hidden"}`}>
          <div className="strip">
            <div className="strip-top">
              <span className="strip-title">{rangeA&&rangeB&&rangeA!==rangeB?`${rangeA}–${rangeB} ${MONTHS[mo]}`:rangeA?`${rangeA} ${MONTHS[mo]}`:"Seleziona"}</span>
              <button className="strip-close" onClick={resetRange}>×</button>
            </div>
            <div className="shift-pills">
              {allShifts.map(s=>(
                <button key={s.id} className="spill" style={{background:`${s.color}18`,borderColor:`${s.color}45`,color:s.color}} onClick={()=>applyToRange(s.id)}>
                  <div className="spill-icon" style={{background:s.color}}>{s.icon}</div>
                  <span className="spill-lbl">{s.label}</span>
                </button>
              ))}
            </div>
            <div className="note-row" style={{marginTop:10}}>
              <input className="note-inp" placeholder="Nota opzionale…" value={noteVal} onChange={e=>setNoteVal(e.target.value)}/>
              <button className="btn-clear" onClick={clearRange}>🗑</button>
            </div>
            <div style={{fontSize:11,color:"#444",textAlign:"center",marginTop:8,fontWeight:600,letterSpacing:".3px"}}>TOCCA UN TURNO PER APPLICARLO SUBITO</div>

            {/* TURNO MANUALE */}
            <div style={{marginTop:10,borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:10}}>
              <button onClick={()=>setShowManuale(p=>!p)} style={{width:"100%",background:showManuale?"rgba(255,107,53,.2)":"rgba(255,255,255,.04)",border:"1px solid",borderColor:showManuale?"rgba(255,107,53,.5)":"rgba(255,255,255,.1)",borderRadius:10,padding:"10px 14px",color:showManuale?"#FF6B35":"#666",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                ✏️ {showManuale?"Chiudi turno manuale":"Inserisci turno manuale"}
              </button>
              {showManuale&&<div style={{marginTop:10,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,107,53,.2)",borderRadius:12,padding:14,display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Nome turno *</div>
                    <input value={manualeForm.label} onChange={e=>setManualeForm(p=>({...p,label:e.target.value}))} placeholder="Es. Spezzato, Rinforzo…" style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"9px 10px",color:"#E2E2F0",fontFamily:"'Syne',sans-serif",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{width:60}}>
                    <div style={{fontSize:9,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Emoji</div>
                    <input value={manualeForm.icon} onChange={e=>setManualeForm(p=>({...p,icon:e.target.value}))} maxLength={2} style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"9px 6px",color:"#E2E2F0",fontSize:20,textAlign:"center",outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{width:48}}>
                    <div style={{fontSize:9,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Colore</div>
                    <input type="color" value={manualeForm.color} onChange={e=>setManualeForm(p=>({...p,color:e.target.value}))} style={{width:"100%",height:38,borderRadius:8,border:"none",cursor:"pointer",background:"none",padding:0}}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Inizio</div>
                    <input type="time" value={manualeForm.start} onChange={e=>setManualeForm(p=>({...p,start:e.target.value}))} style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"9px 10px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Fine</div>
                    <input type="time" value={manualeForm.end} onChange={e=>setManualeForm(p=>({...p,end:e.target.value}))} style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"9px 10px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                </div>
                {manualeForm.label.trim()&&<div style={{background:`${manualeForm.color}18`,border:`1px solid ${manualeForm.color}40`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:9,background:manualeForm.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{manualeForm.icon||"🚌"}</div>
                  <div>
                    <div style={{fontWeight:800,color:manualeForm.color,fontSize:14}}>{manualeForm.label}</div>
                    {manualeForm.start&&manualeForm.end&&<div style={{fontSize:12,color:"#aaa",fontFamily:"'JetBrains Mono',monospace"}}>{manualeForm.start} → {manualeForm.end}</div>}
                  </div>
                </div>}
                <button onClick={applyManuale} style={{width:"100%",background:`linear-gradient(135deg,${manualeForm.color},${manualeForm.color}bb)`,border:"none",color:"white",padding:"12px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>
                  ✓ Applica turno manuale
                </button>
              </div>}
            </div>

          </div>
        </div>

        {/* BOTTOM NAV */}
        <div className={`bnav${(stripOpen||dayDetail)?" hidden":""}`}>
          {[["cal","📅","Calendario"],["rot","🔄","Rotazione"],["stats","📊","Report"],["shifts","🎨","Turni"],["import","📥","Importa"],["esporta","📤","Esporta"],["guide","❓","Guida"]].map(([id,ic,lb])=>(
            <div key={id} className={`bni${tab===id?" on":""}`} onClick={()=>{setTab(id);resetRange();}}>
              <span className="bni-ic">{ic}</span>
              <span className="bni-lbl">{lb}</span>
            </div>
          ))}
        </div>

        {/* MODAL NUOVO TURNO */}
        {modal&&<div className="modal-bg" onClick={()=>setModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">Nuovo turno personalizzato</div>
            <div className="fg"><label className="fl">Nome</label><input className="finp" placeholder="Es: Spezzato" value={ns.label} onChange={e=>setNs(p=>({...p,label:e.target.value}))}/></div>
            <div className="frow">
              <div className="fg" style={{flex:1}}><label className="fl">Emoji</label><input className="finp" maxLength={2} placeholder="🚌" value={ns.icon} onChange={e=>setNs(p=>({...p,icon:e.target.value}))} style={{fontSize:20,textAlign:"center"}}/></div>
              <div className="fg" style={{flex:1}}><label className="fl">Colore</label><input type="color" value={ns.color} onChange={e=>setNs(p=>({...p,color:e.target.value}))} style={{width:"100%",height:42,borderRadius:9,border:"none",cursor:"pointer",background:"none"}}/></div>
            </div>
            <div className="frow">
              <div className="fg" style={{flex:1}}><label className="fl">Inizio</label><input type="time" className="finp" value={ns.start} onChange={e=>setNs(p=>({...p,start:e.target.value}))}/></div>
              <div className="fg" style={{flex:1}}><label className="fl">Fine</label><input type="time" className="finp" value={ns.end} onChange={e=>setNs(p=>({...p,end:e.target.value}))}/></div>
            </div>
            <button className="btn-apply" onClick={saveNewShift} style={{marginTop:4}}>✓ Crea Turno</button>
            <button onClick={()=>setModal(false)} style={{width:"100%",background:"none",border:"none",color:"#444",padding:"12px",cursor:"pointer",fontSize:13,fontFamily:"'Syne',sans-serif",marginTop:4}}>Annulla</button>
          </div>
        </div>}

        <div className={`toast${toast.show?" on":""}`}>{toast.msg}</div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ANMOperator));
</script>
</body>
</html>
