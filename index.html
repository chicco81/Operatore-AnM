function getTipo(m){const n=parseInt(m)||0;return n>=14000&&n<=25000?"ANM":n>=50000&&n<=55000?"INT":"";}
async function sha256(s){
  // Usa crypto.subtle se disponibile (HTTPS/localhost), altrimenti fallback
  if(typeof crypto!=="undefined"&&crypto.subtle){
    try{
      const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
      return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");
    }catch(e){}
  }
  // Fallback: hash semplice ma funzionale per uso locale
  let h=0x811c9dc5;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*0x01000193)>>>0;}
  let h2=0;for(let i=s.length-1;i>=0;i--){h2^=s.charCodeAt(i);h2=(h2*16777619)>>>0;}
  return h.toString(16).padStart(8,"0")+h2.toString(16).padStart(8,"0")+
    (h^h2).toString(16).padStart(8,"0")+(h*h2>>>0).toString(16).padStart(8,"0")+
    s.split("").reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0,0).toString(16).padStart(8,"0")+
    s.split("").reverse().reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0,0).toString(16).padStart(8,"0")+
    (s.length*31+7).toString(16).padStart(8,"0")+(h+h2).toString(16).padStart(8,"0");
}

function getEaster(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return{month:mo-1,day:dy};}
function getFestivita(y){const _dk=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const e=getEaster(y),r={};[[0,1,'Capodanno'],[0,6,'Epifania'],[3,25,'25 Aprile'],[4,1,'1 Maggio'],[5,2,'2 Giugno'],[7,15,'Ferragosto'],[10,1,'Ognissanti'],[11,8,'Immacolata'],[11,25,'Natale'],[11,26,'S.Stefano']].forEach(([mo,dy,n])=>{r[_dk(y,mo,dy)]=n;});r[_dk(y,e.month,e.day)]='Pasqua';const pm=new Date(y,e.month,e.day+1);r[_dk(pm.getFullYear(),pm.getMonth(),pm.getDate())]='Pasquetta';return r;}

function ANMLogo({ size = 36 }) {
  // Proporzioni originali logo ANM: circa 2.4:1 (larghezza:altezza)
  const w = Math.round(size * 2.2);
  const h = size;
  return (
    React.createElement('svg', { width: w, height: h, viewBox: "0 0 88 36"   , xmlns: "http://www.w3.org/2000/svg",}
      /* Sfondo blu navy con angoli arrotondati */
      , React.createElement('rect', { width: "88", height: "36", rx: "5", fill: "#1a1f8c",})
      /* Lettere "anm" minuscole in arancione/giallo ANM */
      , React.createElement('text', {
        x: "44",
        y: "27",
        textAnchor: "middle",
        fontFamily: "Arial, Helvetica, sans-serif"  ,
        fontWeight: "bold",
        fontSize: "26",
        fill: "#f5a623",
        letterSpacing: "1",}
, "anm")
    )
  );
}

.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 2px 8px rgba(26,31,140,.5))}
.logo-txt{font-size:15px;font-weight:800;letter-spacing:-0.8px;background:linear-gradient(90deg,#fff 60%,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mnav{display:flex;align-items:center;gap:10px}
.mnav-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:7px;width:30px;height:30px;cursor:pointer;color:#aaa;font-size:15px;display:flex;align-items:center;justify-content:center}
.mnav-btn:active{background:rgba(255,107,53,.2);border-color:rgba(255,107,53,.4);color:#FF6B35}
.mnav-label{text-align:center;min-width:110px}
.mnav-month{font-size:16px;font-weight:700;letter-spacing:-.3px}
.mnav-year{font-size:11px;color:#444;font-family:'JetBrains Mono',monospace;margin-top:1px}
.modebar{display:flex;gap:6px;padding:8px 0 12px;overflow-x:auto}
.modebar::-webkit-scrollbar{display:none}
.mode-btn{flex-shrink:0;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#555;letter-spacing:.3px;text-transform:uppercase}
.mode-btn.active{background:rgba(255,107,53,.15);border-color:rgba(255,107,53,.4);color:#FF6B35}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 14px 180px;position:relative;z-index:1}
.cal-dh{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.cal-dh-cell{text-align:center;font-size:9px;font-weight:700;color:#333;padding:5px 0;letter-spacing:.8px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day{border-radius:10px;min-height:74px;display:flex;flex-direction:column;cursor:pointer;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);position:relative;user-select:none;overflow:hidden;transition:transform .12s}
.day:active{transform:scale(.91)}
.day.is-today{box-shadow:0 0 0 2px #FF6B35}
.day.in-range{box-shadow:0 0 0 2px rgba(255,107,53,.5)!important}
.day.range-start{box-shadow:0 0 0 2px #FF6B35!important}
.day-num{font-size:10px;font-family:'JetBrains Mono',monospace;color:#444;font-weight:600;padding:4px 5px 2px;line-height:1;align-self:flex-start}
.day-num.today{color:#FF6B35;font-weight:800}
.day-filled{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px 3px 5px}
.note-pip{width:5px;height:5px;border-radius:50%;background:#FF6B35;position:absolute;top:3px;right:3px;z-index:2}
.dpanel{position:fixed;bottom:0;left:0;right:0;z-index:250;background:#0e0e1e;border-radius:22px 22px 0 0;transition:transform .38s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 40px rgba(0,0,0,.6);max-height:88vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.dpanel.hidden{transform:translateY(110%)}
.dpanel-hero{padding:22px 20px 16px;display:flex;align-items:center;gap:16px;border-radius:22px 22px 0 0}
.dpanel-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.dpanel-title{font-size:24px;font-weight:800;letter-spacing:-.6px;line-height:1.1}
.dpanel-fascia{font-size:13px;font-weight:700;margin-top:4px;opacity:.8}
.dpanel-body{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.dpanel-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border-radius:12px;padding:13px 15px}
.dpanel-row-ic{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.dpanel-row-content{flex:1}
.dpanel-row-label{font-size:10px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.dpanel-row-value{font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-.3px}
.dpanel-btns{display:flex;gap:10px;padding:4px 16px 0}
.dpanel-btn-change{flex:1;background:linear-gradient(135deg,#FF6B35,#FF3CAC);border:none;color:white;padding:14px;border-radius:12px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
.dpanel-btn-close{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#888;padding:14px 18px;border-radius:12px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.vettura-section{background:rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.vettura-section-label{font-size:10px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.vettura-chip{display:flex;align-items:center;gap:6px;background:rgba(255,107,53,.15);border:1px solid rgba(255,107,53,.35);border-radius:8px;padding:6px 10px}
.vettura-chip-num{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800;color:#FF6B35;letter-spacing:.5px}
.vettura-chip-del{background:none;border:none;color:rgba(255,107,53,.6);cursor:pointer;font-size:16px;padding:0;line-height:1}
.vettura-add-row{display:flex;gap:8px;align-items:center}
.vettura-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:9px;outline:none;color:#E2E2F0;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;letter-spacing:1px;padding:9px 12px}
.vettura-inp:focus{border-color:#FF6B35}
.vettura-add-btn{background:rgba(255,107,53,.2);border:1px solid rgba(255,107,53,.4);color:#FF6B35;padding:9px 14px;border-radius:9px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;white-space:nowrap}
.sae-chip{display:flex;align-items:center;gap:6px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);border-radius:8px;padding:6px 10px}
.sae-chip-num{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800;color:#A5B4FC}
.sae-chip-del{background:none;border:none;color:rgba(165,180,252,.6);cursor:pointer;font-size:16px;padding:0;line-height:1}
.sae-add-btn{background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.4);color:#A5B4FC;padding:9px 14px;border-radius:9px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;white-space:nowrap}
.guasto-btn{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#FCA5A5;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}
.guasto-btn.active{background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.5);color:#EF4444}
.guasto-panel{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;margin-top:2px}
.guasto-panel-label{font-size:10px;color:#FCA5A5;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.guasto-textarea{background:rgba(0,0,0,.2);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:9px 11px;color:#E2E2F0;font-family:'Syne',sans-serif;font-size:13px;line-height:1.5;outline:none;resize:none;width:100%;box-sizing:border-box}
.guasto-textarea:focus{border-color:#EF4444}
.guasto-save-btn{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#EF4444;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;align-self:flex-end}
.guasto-badge{font-size:11px;color:#FCA5A5;font-style:italic;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guasto-share-btn{width:100%;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;padding:11px;border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;margin-top:2px}
.esporta-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px;margin-bottom:12px;display:flex;flex-direction:column;gap:14px}
.esporta-card-title{font-size:13px;font-weight:700;color:#E2E2F0}
.esporta-card-desc{font-size:12px;color:#555;line-height:1.55;margin-top:-6px}
.esporta-btn{display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:12px;border:1px solid;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;width:100%;box-sizing:border-box}
.esporta-btn-turni{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.35);color:#A5B4FC}
.esporta-btn-quindicinale{background:rgba(255,107,53,.12);border-color:rgba(255,107,53,.35);color:#FF6B35}
.esporta-btn-guasti{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#FCA5A5}
.esporta-btn-ic{font-size:22px;width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);flex-shrink:0}
.esporta-btn-body{flex:1;text-align:left}
.esporta-btn-label{font-size:14px;font-weight:800}
.esporta-btn-sub{font-size:11px;font-weight:600;opacity:.6;margin-top:2px}
.guasti-list{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px;margin-top:12px}
.guasti-list-title{font-size:10px;font-weight:700;color:#EF4444;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.guasto-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.guasto-item:last-child{border-bottom:none;padding-bottom:0}
.guasto-item-date{font-size:11px;color:#555;font-weight:700;min-width:60px;padding-top:2px}
.guasto-item-body{flex:1}
.guasto-item-vet{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:#FF6B35;margin-bottom:3px}
.guasto-item-desc{font-size:13px;color:#aaa;line-height:1.4}
.range-hint{font-size:12px;color:#FF6B35;font-weight:600;padding:10px 2px 6px;min-height:34px;letter-spacing:-.2px}
.strip-wrap{position:fixed;bottom:0;left:0;right:0;z-index:200;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.strip-wrap.hidden{transform:translateY(100%)}
.strip{background:#0d0d1c;border-top:2px solid rgba(255,107,53,.3);padding:16px 16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,20px))}
.strip-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.strip-title{font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px}
.strip-close{background:rgba(255,255,255,.06);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;color:#666;font-size:15px;display:flex;align-items:center;justify-content:center}
.shift-pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px}
.shift-pills::-webkit-scrollbar{display:none}
.spill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;border-radius:12px;border:1px solid;cursor:pointer;min-width:58px;background:none;transition:transform .12s}
.spill:active{transform:scale(.9)}
.spill-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.spill-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;font-family:'Syne',sans-serif}
.note-row{display:flex;gap:8px;margin-top:10px}
.note-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:8px 11px;color:#E2E2F0;font-family:'Syne',sans-serif;font-size:13px;outline:none}
.note-inp:focus{border-color:#FF6B35}
.btn-clear{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#EF4444;padding:12px 14px;border-radius:11px;cursor:pointer;font-size:14px}
.rot-block{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;margin-bottom:12px}
.rot-block-title{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.cycle-builder{display:flex;flex-wrap:wrap;gap:6px;min-height:42px;background:rgba(0,0,0,.2);border:1px dashed rgba(255,255,255,.08);border-radius:10px;padding:8px;align-content:flex-start}
.cycle-pill{display:flex;align-items:center;gap:5px;border-radius:16px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid}
.cycle-pill-n{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;min-width:12px}
.cycle-pill-x{color:rgba(255,255,255,.2);font-size:13px;margin-left:1px}
.rot-palette{display:flex;flex-wrap:wrap;gap:6px}
.rot-pal-btn{display:flex;align-items:center;gap:6px;border-radius:16px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;border:1px solid;background:none;font-family:'Syne',sans-serif}
.rot-preview{display:flex;gap:4px;overflow-x:auto;padding:6px 0}
.rot-preview::-webkit-scrollbar{display:none}
.rot-prev-cell{flex-shrink:0;width:36px;height:48px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:1px solid rgba(255,255,255,.06)}
.rot-prev-d{font-size:8px;font-family:'JetBrains Mono',monospace;color:#444}
.date-inp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:10px 12px;color:#E2E2F0;font-family:'Syne',sans-serif;font-size:14px;outline:none;width:100%;margin-bottom:12px}
.date-inp:focus{border-color:#FF6B35}
.repeat-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.repeat-opt{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:none;color:#555;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer}
.repeat-opt.active{background:rgba(255,107,53,.15);border-color:rgba(255,107,53,.4);color:#FF6B35}
.btn-apply{width:100%;background:linear-gradient(135deg,#FF6B35,#FF3CAC);border:none;color:white;padding:13px;border-radius:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:.3px}
.btn-apply:disabled{opacity:.3;cursor:default}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:rgba(255,255,255,.03);border-radius:12px;padding:16px;text-align:center;border:1px solid}
.stat-ic{font-size:24px;margin-bottom:6px}
.stat-v{font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.stat-l{font-size:10px;color:#444;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-track{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.shifts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sc{background:rgba(255,255,255,.03);border-radius:12px;padding:12px;text-align:center;border:1px solid}
.sc-ic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 7px}
.sc-lbl{font-size:12px;font-weight:700;margin-bottom:2px}
.sc-time{font-size:10px;color:#444;font-family:'JetBrains Mono',monospace}
.btn-del{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#EF4444;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:10px;margin-top:7px;font-family:'Syne',sans-serif}
.btn-new-shift{width:100%;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.25);color:#FF6B35;padding:13px;border-radius:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:16px}
.btn-import{width:100%;background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(16,185,129,.08));border:1px solid rgba(16,185,129,.4);color:#10B981;padding:15px;border-radius:12px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px}
.import-preview{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:14px;margin-bottom:14px}
.import-preview-title{font-size:11px;font-weight:800;color:#10B981;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.import-confirm{width:100%;background:linear-gradient(135deg,#10B981,#059669);border:none;color:white;padding:13px;border-radius:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;margin-bottom:8px}
.import-cancel{width:100%;background:none;border:none;color:#444;padding:10px;cursor:pointer;font-size:13px;font-family:'Syne',sans-serif}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:flex-end}
.modal{background:#0e0e1c;border-top:1px solid rgba(255,255,255,.08);border-radius:22px 22px 0 0;padding:22px 18px;padding-bottom:calc(22px + env(safe-area-inset-bottom,0px));width:100%;max-height:85vh;overflow-y:auto}
.modal-handle{width:32px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px}
.fl{font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.fg{margin-bottom:12px}
.frow{display:flex;gap:8px}
.finp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:9px 11px;color:#E2E2F0;font-family:'Syne',sans-serif;font-size:14px;outline:none;width:100%}
.finp:focus{border-color:#FF6B35}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.05);display:flex;padding-bottom:env(safe-area-inset-bottom,8px);z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.bnav.hidden{transform:translateY(100%)}
.bni{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 5px;cursor:pointer}
.bni-ic{font-size:20px}
.bni-lbl{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#333}
.bni.on .bni-lbl{color:#FF6B35}
.bni.on .bni-ic{filter:drop-shadow(0 0 6px rgba(255,107,53,.6))}
.toast{position:fixed;top:calc(env(safe-area-inset-top,44px) + 60px);left:50%;transform:translateX(-50%) translateY(-8px);background:#1a1a2e;border:1px solid rgba(255,107,53,.35);border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;color:#FF6B35;z-index:400;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.ph{font-size:21px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.ps{font-size:12px;color:#444;margin-bottom:18px;font-weight:500}
.install-banner{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(255,60,172,.1));border:1px solid rgba(255,107,53,.3);border-radius:14px;padding:14px 16px;margin-bottom:16px}
.install-banner-icon{font-size:28px;flex-shrink:0}
.install-banner-text{flex:1}
.install-banner-title{font-size:13px;font-weight:800;color:#FF6B35;margin-bottom:2px}
.install-banner-sub{font-size:11px;color:#666;line-height:1.4}
.install-banner-btn{background:linear-gradient(135deg,#FF6B35,#FF3CAC);border:none;color:white;padding:8px 14px;border-radius:9px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;white-space:nowrap;flex-shrink:0}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp .22s ease}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

.light{background:#F0F2F8!important}
.light .hdr{background:linear-gradient(180deg,#E8EAFF,transparent)!important}

function useToast() {
  const [t,setT] = useState({msg:"",show:false});
  const ref = useRef();
  const fire = useCallback(msg => {
    setT({msg,show:true});
    clearTimeout(ref.current);
    ref.current = setTimeout(()=>setT(p=>({...p,show:false})),2400);
  },[]);
  return [t,fire];
}

  function parseANMItems(items){
    const dateRe=/^(\d{2})\/(\d{2})\/(\d{4})$/,timeRe=/^\d{2}:\d{2}$/;
    const SKIP=new Set(["Interi","0","Lun","Mar","Mer","Gio","Ven","Sab","Dom","Dep","Linea","PGM"]);
    return items.filter(it=>it.x>=40&&it.x<=115&&dateRe.test(it.str)&&it.y>50&&it.y<720).map(anchor=>{
      const dm=anchor.str.match(dateRe),day=parseInt(dm[1]),month=parseInt(dm[2])-1,year=parseInt(dm[3]);
      const row=items.filter(it=>Math.abs(it.y-anchor.y)<=3.5),rowStr=row.map(i=>i.str).join(" ");
      let tipo="servizio";
      if(/RIPOSO/i.test(rowStr)) tipo="riposo";
      else if(/spezzato\s+apertura/i.test(rowStr)) tipo="spezzato_ap";
      else if(/spezzato\s+chiusura/i.test(rowStr)) tipo="spezzato_ch";
      else if(/DISP/i.test(rowStr)&&/SERALE/i.test(rowStr)) tipo="disp_serale";
      if(tipo!=="servizio") return {day,month,year,tipo,linea:"",uscita:"",pres:"",fine:"",loc:""};
      const get=(x0,x1,test)=>(row.find(it=>it.x>=x0&&it.x<=x1&&(!test||test(it.str)))||{str:""}).str;
      const uscita=get(110,155,t=>timeRe.test(t)),linea=get(155,215,t=>!timeRe.test(t)&&!SKIP.has(t)&&!dateRe.test(t)&&t.length>=2);
      const loc=get(195,250,t=>!timeRe.test(t)&&!SKIP.has(t)&&!dateRe.test(t)&&t.length>=3);
      const pres=get(245,285,t=>timeRe.test(t)),durata=get(345,390,t=>timeRe.test(t));
      return {day,month,year,tipo,linea,uscita,pres,fine:(pres&&durata)?calcEndTime(pres,durata):"",loc};
    });
  }

  function parseDinoBot(){
    const txt = dinoText.trim();
    if(!txt){ fire("Incolla il messaggio del bot!"); return; }
    const headerMatch = txt.match(/([A-ZÀÈÌÒÙ]+),\s*per il giorno\s*(\d{2})\/(\d{2})\/(\d{4})/i);
    if(!headerMatch){ fire("Formato non riconosciuto — copia tutto il messaggio"); return; }
    const nome = headerMatch[1];
    const day = parseInt(headerMatch[2]);
    const month = parseInt(headerMatch[3]) - 1;
    const year = parseInt(headerMatch[4]);
    const turnoMatch = txt.match(/Turno\s+([\d\-]+[A-Z]*)/i);
    const turno = turnoMatch ? turnoMatch[1] : "";
    const montoRe = /monto\s+[^a]+alle\s+(\d{2}:\d{2})/gi;
    const smontoRe = /smonto\s+[^a]+alle\s+(\d{2}:\d{2})/gi;
    const monti=[], smonti=[];
    let m;
    while((m=montoRe.exec(txt))!==null) monti.push(m[1]);
    while((m=smontoRe.exec(txt))!==null) smonti.push(m[1]);
    const start = monti[0] || "";
    const end = smonti[smonti.length-1] || "";
    const depMatch = txt.match(/monto\s+([A-Z][^a]+?)\s+alle\s+\d/i);
    const deposito = depMatch ? depMatch[1].trim() : "";
    const nastroPart = txt.split("nastro")[1] || "";
    const nastroCodes = [...new Set((nastroPart.match(/^(\d{4,6})\s/gm)||[]).map(x=>x.trim()))];
    const linea = turno || nastroCodes[0] || "";
    const pezziMatch = txt.match(/Pezzo\s+\d/gi);
    const pezzi = pezziMatch ? pezziMatch.length : 1;
    let h24=parseInt((start||"0:0").split(":")[0])||0;
      let icon=h24>=21?"🌙":h24>=17?"🌆":h24>=12?"☀️":"🌅";
      let color=h24>=21?"#8B5CF6":h24>=17?"#F59E0B":h24>=12?"#3B82F6":"#F59E0B";
    if(start){
      const [h]=start.split(":").map(Number);
      if(h>=14&&h<22){icon="☀️";color="#3B82F6";}
      else if(h>=22||h<5){icon="🌙";color="#8B5CF6";}
    }
    const preview = {nome,day,month,year,turno,start,end,deposito,linea,pezzi,icon,color,nastroCodes};
    setDinoPreview(preview);
    fire(`✓ Trovato turno ${turno} del ${day}/${month+1}/${year}`);
  }

}

function PinScreen({onUnlock}){

  const [err,setErr]=useState(""); const [ok,setOk]=useState(false);
  async function save(){
    if(!o||!n1||!n2){setErr("Compila tutti i campi");return;}
    if(n1!==n2){setErr("Password non coincidono");return;}
    if(n1.length<4){setErr("Min. 4 caratteri");return;}
    const accs=getAccounts(),acc=accs[utente];
    if(!acc){setErr("Account non trovato");return;}
    if(await sha256(o)!==acc.pwdHash){setErr("Vecchia password errata");return;}
    accs[utente]={...acc,pwdHash:await sha256(n1)};
    setAccounts(accs);
    try{const s=localStorage.getItem("anm_remember");if(s){const r=JSON.parse(s);r.pwd=n1;localStorage.setItem("anm_remember",JSON.stringify(r));}}catch(e){}
    setOk(true);setErr("");setO("");setN1("");setN2("");
    fire("✓ Password aggiornata!");

    , React.createElement(SRow, { ic: "🔑", title: "Cambia password" , sub: "Modifica la password di accesso"    , right: open?"∨":"›", onClick: ()=>{setOpen(p=>!p);setErr("");},})

            style: {width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:9,padding:"10px 12px",color:"#E2E2F0",fontFamily:"'Syne',sans-serif",fontSize:14,outline:"none",boxSizing:"border-box"},})

// Parser testo busta paga
function parseBustaPaga(testo, turniMese, allShifts, festivita, yr, mo){
  const righe = testo.split('\n').map(r=>r.trim()).filter(r=>r.length>0);
  const upper = testo.toUpperCase();
  
  const vociTrovate = [];
  let totaleNetto = 0;
  let totaleLordo = 0;
  
  // Cerca importi associati a voci
  righe.forEach((riga,i)=>{
    const rigaUp = riga.toUpperCase();
    Object.entries(VOCI_CCNL).forEach(([nome,info])=>{
      if(rigaUp.includes(nome)){
        // Cerca numero nella stessa riga o nelle 2 righe successive
        const cercaIn = [riga, righe[i+1]||"", righe[i+2]||""].join(" ");
        const nums = cercaIn.match(/[\d.,]+/g)||[];
        const importi = nums.map(n=>parseFloat(n.replace(",","."))||0).filter(n=>n>0&&n<99999);
        const importo = importi.length>0 ? Math.max(...importi) : 0;
        if(importo>0){
          vociTrovate.push({nome, ...info, importo, riga});
        }
      }
    });
    
    // Cerca totale netto/lordo
    if(rigaUp.includes("NETTO A PAGARE")||rigaUp.includes("NETTO DA PAGARE")){
      const nums=(riga+" "+(righe[i+1]||"")).match(/[\d.,]+/g)||[];
      const vals=nums.map(n=>parseFloat(n.replace(",","."))||0).filter(n=>n>100&&n<99999);
      if(vals.length>0) totaleNetto=Math.max(...vals);
    }
    if(rigaUp.includes("TOTALE COMPETENZE")||rigaUp.includes("TOTALE LORDO")){
      const nums=(riga+" "+(righe[i+1]||"")).match(/[\d.,]+/g)||[];
      const vals=nums.map(n=>parseFloat(n.replace(",","."))||0).filter(n=>n>100&&n<99999);
      if(vals.length>0) totaleLordo=Math.max(...vals);
    }
  });
  
  // Calcolo atteso dai turni
  const pfx=`${yr}-${String(mo+1).padStart(2,"0")}`;
  let oreOrd=0,oreStr=0,oreDom=0,oreFest=0,oreNot=0,nSpezz=0,gg=0;
  
  Object.entries(turniMese||{}).forEach(([key,val])=>{
    if(!key.startsWith(pfx)) return;
    const sh=allShifts.find(x=>x.id===val.shiftId);
    if(!sh||!sh.start||!sh.end) return;
    gg++;
    const h=calcH(sh.start,sh.end);
    const d=parseInt(key.split("-")[2]);
    const date=new Date(yr,mo,d);
    const dow=(date.getDay()+6)%7;
    const isFesta=!!festivita[key];
    const isDom=dow===6;
    const startH=parseInt((sh.start||"0").split(":")[0])||0;
    const isNot=startH>=22||startH<6;
    const isSpezz=sh.id&&(sh.id.includes("spezz")||sh.label.toLowerCase().includes("spezz"));
    if(isSpezz) nSpezz++;
    if(isFesta){oreFest+=h;}
    else if(isDom){oreDom+=h;}
    else if(h>8){oreOrd+=8;oreStr+=(h-8);}
    else oreOrd+=h;
    if(isNot) oreNot+=h;
  });
  
  const tar=()=>{try{const s=localStorage.getItem("anm_tar");if(s)return JSON.parse(s);}catch(e){}return{base:14.28,str150:21.42,domenicale:3.20,festivo:4.80,notturno:1.95,spezzato:2.50,prezenza:8.50};};
  const T=tar();
  const atteso={
    straord: +(oreStr*T.str150).toFixed(2),
    dom:     +(oreDom*T.domenicale).toFixed(2),
    fest:    +(oreFest*T.festivo).toFixed(2),
    not:     +(oreNot*T.notturno).toFixed(2),
    spezz:   +(nSpezz*T.spezzato).toFixed(2),
    pres:    +(gg*T.prezenza).toFixed(2),
    oreOrd, oreStr, oreDom, oreFest, oreNot, nSpezz, gg
  };
  
  // Anomalie
  const anomalie = [];
  const straordBusta = vociTrovate.filter(v=>v.tipo==="straord").reduce((a,v)=>a+v.importo,0);
  if(atteso.straord>0 && straordBusta===0)
    anomalie.push({sev:"alta", msg:`Straordinari non trovati in busta! Atteso €${atteso.straord.toFixed(2)} per ${oreStr.toFixed(1)}h`});
  else if(atteso.straord>0 && Math.abs(straordBusta-atteso.straord)>5)
    anomalie.push({sev:"media", msg:`Straordinari: busta €${straordBusta.toFixed(2)} vs atteso €${atteso.straord.toFixed(2)} (diff €${(straordBusta-atteso.straord).toFixed(2)})`});
  
  const domBusta = vociTrovate.filter(v=>v.tipo==="dom").reduce((a,v)=>a+v.importo,0);
  if(atteso.dom>0 && domBusta===0)
    anomalie.push({sev:"alta", msg:`Maggiorazione domenicale mancante! Atteso €${atteso.dom.toFixed(2)}`});
  
  const festBusta = vociTrovate.filter(v=>v.tipo==="fest").reduce((a,v)=>a+v.importo,0);
  if(atteso.fest>0 && festBusta===0)
    anomalie.push({sev:"alta", msg:`Maggiorazione festiva mancante! Atteso €${atteso.fest.toFixed(2)}`});
  
  if(atteso.not>0 && vociTrovate.filter(v=>v.tipo==="not").length===0)
    anomalie.push({sev:"media", msg:`Indennità notturna non trovata. Atteso €${atteso.not.toFixed(2)}`});
  
  if(anomalie.length===0 && vociTrovate.length>0)
    anomalie.push({sev:"ok", msg:"Nessuna anomalia rilevata ✅"});
  if(vociTrovate.length===0)
    anomalie.push({sev:"info", msg:"Nessuna voce riconosciuta — il formato della busta potrebbe essere diverso dal previsto"});
  
  return {vociTrovate, totaleNetto, totaleLordo, atteso, anomalie, gg};
}

// ── COMPONENTE BUSTA PAGA ─────────────────────────────────────────────────────
function BustaPagaTab({st, yr, mo, allShifts, festivita}){
  const MESI=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const [loading,setLoading] = useState(false);
  const [analisi,setAnalisi] = useState(null);
  const [archivio,setArchivio] = useState(()=>getBusteArchivio());
  const [viewArch,setViewArch] = useState(null);
  const [tab,setTab] = useState("analisi"); // analisi | archivio
  const pdfRef = useRef();

  async function caricaPDF(e){
    const file = e.target.files[0];
    if(!file) return;
    e.target.value="";
    setLoading(true);
    setAnalisi(null);
    
    try{
      // Carica pdf.js se non già caricato
      if(!window.pdfjsLib){
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res();}
          s.onerror=rej;
          document.head.appendChild(s);
        });
      }
      
      const ab = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({data:ab}).promise;
      let testo = "";
      
      for(let p=1;p<=pdf.numPages;p++){
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        testo += content.items.map(i=>i.str).join(" ") + "\n";
      }
      
      // Cerca mese/anno dalla busta
      const meseMatch = testo.match(/\b(GENNAIO|FEBBRAIO|MARZO|APRILE|MAGGIO|GIUGNO|LUGLIO|AGOSTO|SETTEMBRE|OTTOBRE|NOVEMBRE|DICEMBRE)\b/i);
      const annoMatch = testo.match(/\b(202\d)\b/);
      
      const result = parseBustaPaga(testo, st.shifts, allShifts, festivita, yr, mo);
      result.testo = testo;
      result.fileName = file.name;
      result.mese = meseMatch ? meseMatch[1] : MESI[mo];
      result.anno = annoMatch ? annoMatch[1] : String(yr);
      result.dataCarico = Date.now();
      
      setAnalisi(result);
      setLoading(false);
      
    }catch(err){
      setLoading(false);
      setAnalisi({errore: err.message});
    }
  }

  function salvaInArchivio(){
    if(!analisi||analisi.errore) return;
    const arch = getBusteArchivio();
    // Evita duplicati per stesso mese/anno
    const filtered = arch.filter(b=>!(b.mese===analisi.mese&&b.anno===analisi.anno));
    filtered.unshift({...analisi, testo:undefined}); // non salvare il testo grezzo
    if(filtered.length>24) filtered.splice(24);
    saveBusteArchivio(filtered);
    setArchivio(filtered);
    alert("Busta salvata in archivio!");
  }

  const SEV_COLOR = {alta:"#EF4444", media:"#F59E0B", ok:"#10B981", info:"#6366F1"};
  const SEV_IC = {alta:"🔴", media:"🟡", ok:"✅", info:"ℹ️"};

  return (
    React.createElement('div', { className: "slide-up",}
      , React.createElement('div', { className: "ph",}, "📄 Busta Paga"  )
      , React.createElement('div', { className: "ps",}, "Analisi e archivio cedolini mensili"    )

      /* Tab switcher */
      , React.createElement('div', { style: {display:"flex",gap:8,marginBottom:16},}
        , [["analisi","🔍 Analizza"],["archivio","📦 Archivio"]].map(([id,lbl])=>(
          React.createElement('button', { key: id, onClick: ()=>setTab(id),
            style: {flex:1,padding:"10px",borderRadius:10,border:"1px solid",cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,
              background:tab===id?"linear-gradient(135deg,#FF6B35,#FF3CAC)":"rgba(255,255,255,.04)",
              borderColor:tab===id?"transparent":"rgba(255,255,255,.1)",
              color:tab===id?"white":"#888"},}
            , lbl
          )
        ))
      )

      , tab==="analisi"&&React.createElement(React.Fragment, null
